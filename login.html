<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Session Demo</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #eef2f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      padding: 42px 38px;
      width: 100%;
      max-width: 400px;
    }
    .logo { font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
    h2 {
      text-align: center;
      font-size: 1.5rem;
      color: #1a237e;
      margin-bottom: 6px;
    }
    p.subtitle {
      text-align: center;
      color: #999;
      font-size: 0.86rem;
      margin-bottom: 28px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.96rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3f51b5; box-shadow: 0 0 0 3px rgba(63,81,181,0.1); }
    .hint {
      font-size: 0.76rem;
      color: #aaa;
      margin-top: 5px;
    }
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:hover  { background: #283593; }
    .submit-btn:active { transform: scale(0.98); }
    .error-box {
      background: #fdecea;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 10px 14px;
      color: #c62828;
      font-size: 0.86rem;
      margin-bottom: 18px;
      display: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🔐</div>
  <h2>Secure Login</h2>
  <p class="subtitle">HttpSession Tracking Demo</p>

  <!--
    action="LoginServlet" → maps to @WebServlet("/LoginServlet")
    method="post"         → calls doPost() in LoginServlet
  -->
  <form action="LoginServlet" method="post">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="Enter username" required/>
      <p class="hint">Use: admin / user1 / guest</p>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Enter password" required/>
      <p class="hint">Password same as username (e.g. admin / admin)</p>
    </div>
    <button type="submit" class="submit-btn">Login &rarr;</button>
  </form>
</div>
</body>
</html>
